name: Generate Snake

on:
  schedule:
    - cron: "0 */12 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest

    steps:
      # ✅ FIX 1: Checkout repo (this solves your error)
      - name: Checkout repository
        uses: actions/checkout@v3

      # Generate snake
      - name: Generate snake svg
        uses: Platane/snk@v3
        with:
          github_user_name: SuprithKumar20
          outputs: |
            dist/github-contribution-grid-snake.svg

      # Commit file
      - name: Commit snake
        uses: EndBug/add-and-commit@v9
        with:
          add: "dist/github-contribution-grid-snake.svg"
          message: "update snake animation"
          new_branch: output
